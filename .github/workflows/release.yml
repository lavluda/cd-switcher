name: Release

# Builds native binaries for each OS and attaches them to the GitHub release.
#
# CD-Switcher uses Fyne (OpenGL + cgo), so every binary must be built ON its
# target OS with a C toolchain — there is no cross-compile path between OSes. We
# build on a matrix of native runners and upload each artifact to the release for
# the tag that triggered the run.
#
# macOS ships as a .dmg containing a universal (arm64 + amd64) .app bundle:
# clang's universal SDK lets us compile each arch with `-arch` cgo flags and
# `lipo` them together, so a single artifact covers Apple Silicon and Intel
# without depending on the scarce macos-13 (Intel) runners.

on:
  push:
    tags:
      - "v*"
  # Allow attaching binaries to an existing tag/release (e.g. v0.1.0) manually.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach binaries to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-universal
            runner: macos-14
            ext: ".dmg"
          - name: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
            ext: ""
          - name: windows-amd64
            runner: windows-latest
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # Fyne needs OpenGL + X11 development headers to build on Linux; the tray
      # uses libayatana-appindicator.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc pkg-config \
            libgl1-mesa-dev xorg-dev libxkbcommon-dev \
            libayatana-appindicator3-dev

      # macOS: build each arch with clang cross-arch cgo flags, lipo into a
      # universal binary, wrap it in a code-signed .app (menu-bar agent), and
      # package a drag-to-Applications .dmg.
      - name: Build & package (macOS)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail

          CGO_CFLAGS="-arch arm64" CGO_LDFLAGS="-arch arm64" GOARCH=arm64 \
            go build -trimpath -ldflags "-s -w" -o cd-switcher-arm64 .
          CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" -o cd-switcher-amd64 .
          lipo -create -output cd-switcher cd-switcher-arm64 cd-switcher-amd64
          lipo -info cd-switcher

          # App icon: generated in code, rendered to an .icns at multiple sizes.
          go run ./cmd/genicon icon.png
          mkdir icon.iconset
          gen() { sips -z "$1" "$1" icon.png --out "icon.iconset/$2" >/dev/null 2>&1; }
          gen 16 icon_16x16.png;     gen 32 icon_16x16@2x.png
          gen 32 icon_32x32.png;     gen 64 icon_32x32@2x.png
          gen 128 icon_128x128.png;  gen 256 icon_128x128@2x.png
          gen 256 icon_256x256.png;  gen 512 icon_256x256@2x.png
          gen 512 icon_512x512.png;  gen 1024 icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

          APP="CD-Switcher.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp cd-switcher "$APP/Contents/MacOS/cd-switcher"
          chmod +x "$APP/Contents/MacOS/cd-switcher"
          cp icon.icns "$APP/Contents/Resources/icon.icns"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>CD-Switcher</string>
            <key>CFBundleDisplayName</key><string>CD-Switcher</string>
            <key>CFBundleIdentifier</key><string>com.lavluda.cd-switcher</string>
            <key>CFBundleExecutable</key><string>cd-switcher</string>
            <key>CFBundleIconFile</key><string>icon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${{ github.event.inputs.tag || github.ref_name }}</string>
            <key>CFBundleVersion</key><string>${{ github.event.inputs.tag || github.ref_name }}</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST

          # Ad-hoc signature so the app runs on Apple Silicon and isn't flagged
          # as damaged (we have no Developer ID; users still right-click → Open).
          codesign --force --sign - "$APP/Contents/MacOS/cd-switcher"
          codesign --force --sign - "$APP"
          codesign --verify --verbose=2 "$APP"

          mkdir dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "CD-Switcher" -srcfolder dmgroot -ov -format UDZO \
            "cd-switcher-${{ matrix.name }}${{ matrix.ext }}"

      - name: Build
        if: runner.os != 'macOS'
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags "-s -w" -o "cd-switcher-${{ matrix.name }}${{ matrix.ext }}" .

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: cd-switcher-${{ matrix.name }}${{ matrix.ext }}
          fail_on_unmatched_files: true
